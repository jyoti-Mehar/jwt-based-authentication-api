<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
  <style>
body {
    font-family: Arial;
    margin: 40px;
}

input {
    padding: 8px;
    margin: 5px;
    width: 200px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}

h2 {
    color: #333;
}
</style>
</head>
<body>

<h2>Signup</h2>
<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="loginEmail" placeholder="Email"><br><br>
<input id="loginPassword" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<h2>Profile</h2>
<button onclick="profile()">Get Profile</button>

<h2>Admin</h2>
<button onclick="admin()">Get Admin</button>

<h2>Logout</h2>
<button onclick="logout()">Logout</button>

<script>
const URL = "http://localhost:5000/api/auth";

async function signup() {
  const res = await fetch(`${URL}/signup`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });
  if (!res.ok) {
    alert("Signup failed ❌");
    return;
 }

  const data = await res.json();
  alert(JSON.stringify(data));
}

async function login() {
  const res = await fetch(`${URL}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("loginEmail").value,
      password: document.getElementById("loginPassword").value
    })
  });
  if (!res.ok) {
    alert("Login failed ❌");
    return;
}

  const data = await res.json();
  console.log(data);
  localStorage.setItem("token", data.token || data.data?.token);
  alert("Login Success");
}

async function profile() {
  const token = localStorage.getItem("token");

  const res = await fetch(`${URL}/profile`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (res.status === 401) {
    alert("Session expired 🔒");
    localStorage.removeItem("token");
    return;
}

  const data = await res.json();
  alert(JSON.stringify(data));
}

async function admin() {
  const token = localStorage.getItem("token");

  const res = await fetch(`${URL}/admin`, {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (res.status === 401) {
    alert("Session expired 🔒");
    localStorage.removeItem("token");
    return;
}

  const data = await res.json();
  alert(JSON.stringify(data));
}

function logout() {
    localStorage.removeItem("token");
    alert("Logged out");
}

</script>

</body>
</html>
